name: ci
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-gcc-sse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: configure gcc
        run: cmake -S . --preset=default -B build -DCMAKE_CXX_COMPILER=g++-13 -DUSE_SSE_INTERNAL=ON -DUSE_AVX2_INTERNAL=OFF
      - name: check gcc version
        run: g++ --version
      - name: build gcc
        run: cmake --build build --config=Release
      - name: Run GCC Program and Save Output
        run: |
          ./build/Release/LinearAlgebraExample

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: gcc_output_sse.txt
          path: gcc_output_sse.txt

          
  build-gcc-avx2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: configure gcc
        run: cmake -S . --preset=default -B build -DCMAKE_CXX_COMPILER=g++-13 -DUSE_SSE_INTERNAL=OFF -DUSE_AVX2_INTERNAL=ON
      - name: check gcc version
        run: g++ --version
      - name: build gcc
        run: cmake --build build --config=Release
      - name: Run GCC Program and Save Output
        run: |
          ./build/Release/LinearAlgebraExample

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: gcc_output_avx2.txt
          path: gcc_output_avx2.txt

  build-clang-sse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: init
        run: sudo apt update -yqq && sudo apt install -yqq ninja-build clang-18
      - name: configure clang
        run: cmake -S . --preset=ninja-clang -B clang -DCMAKE_CXX_COMPILER=clang++-18 -DUSE_SSE_INTERNAL=ON -DUSE_AVX2_INTERNAL=OFF
      - name: check clang version
        run: clang++ --version
      - name: build clang
        run: cmake --build clang --config=Release
      - name: Run clang Program and Save Output
        run: |
          ./clang/Release/LinearAlgebraExample

      - name: Upload Clang Output
        uses: actions/upload-artifact@v4
        with:
          name: clang_output_sse.txt
          path: clang_output_sse.txt
  
  build-clang-avx2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: init
        run: sudo apt update -yqq && sudo apt install -yqq ninja-build clang-18
      - name: configure clang
        run: cmake -S . --preset=ninja-clang -B clang -DCMAKE_CXX_COMPILER=clang++-18 -DUSE_SSE_INTERNAL=OFF -DUSE_AVX2_INTERNAL=ON
      - name: check clang version
        run: clang++ --version
      - name: build clang
        run: cmake --build clang --config=Release
      - name: Run clang Program and Save Output
        run: |
          ./clang/Release/LinearAlgebraExample

      - name: Upload Clang Output
        uses: actions/upload-artifact@v4
        with:
          name: clang_output_avx2.txt
          path: clang_output_avx2.txt

  build-windows-sse:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - name: configure
        run: cmake -S . --preset=vs22 -B build -DUSE_SSE_INTERNAL=ON -DUSE_AVX2_INTERNAL=OFF
      - name: build
        run: cmake --build build --config=Release 

      - name: Run msvc Program and Save Output
        run: |
          ./build/Release/LinearAlgebraExample.exe

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: msvc_output_sse.txt
          path: msvc_output_sse.txt


  build-windows-avx2:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - name: configure
        run: cmake -S . --preset=vs22 -B build -DUSE_SSE_INTERNAL=OFF -DUSE_AVX2_INTERNAL=ON
      - name: build
        run: cmake --build build --config=Release

      - name: Run msvc Program and Save Output
        run: |
          ./build/Release/LinearAlgebraExample.exe

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: msvc_output_avx2.txt
          path: msvc_output_avx2.txt

  compare-msvc:
    name: Compare MSVC (SSE vs AVX2)
    needs: [build-windows-sse, build-windows-avx2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: msvc_output_sse.txt }
      - uses: actions/download-artifact@v4
        with: { name: msvc_output_avx2.txt }
      - run: diff -u msvc_output_sse.txt msvc_output_avx2.txt

  compare-gcc:
    name: Compare GCC (SSE vs AVX2)
    needs: [build-gcc-sse, build-gcc-avx2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: gcc_output_sse.txt }
      - uses: actions/download-artifact@v4
        with: { name: gcc_output_avx2.txt }
      - run: diff -u gcc_output_sse.txt gcc_output_avx2.txt

  compare-clang:
    name: Compare Clang (SSE vs AVX2)
    needs: [build-clang-sse, build-clang-avx2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: clang_output_sse.txt }
      - uses: actions/download-artifact@v4
        with: { name: clang_output_avx2.txt }
      - run: diff -u clang_output_sse.txt clang_output_avx2.txt

  compare-cross-compiler:
    name: Cross-Compiler Validation (AVX2)
    needs: [build-gcc-avx2, build-clang-avx2, build-windows-avx2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: gcc_output_avx2.txt }
      - uses: actions/download-artifact@v4
        with: { name: clang_output_avx2.txt }
      - uses: actions/download-artifact@v4
        with: { name: msvc_output_avx2.txt }
      - name: GCC vs MSVC
        run: diff -u gcc_output_avx2.txt msvc_output_avx2.txt
      - name: Clang vs MSVC
        run: diff -u clang_output_avx2.txt msvc_output_avx2.txt
      - name: GCC vs Clang
        run: diff -u gcc_output_avx2.txt clang_output_avx2.txt
